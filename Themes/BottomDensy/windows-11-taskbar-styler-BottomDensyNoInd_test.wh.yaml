# declare var: key = value
# use     var: key:=$value
# Margin=←,↑,→,↓
theme: BottomDensy_variant_NoInd
styleConstants:
  - volume_bar_width_outer_152=132 #≝152
  - volume_bar_width_inner_110=90 #≝110
themeResourceVariables:
  - ''
xamlDiagnosticsHandling: alert
controlStyles:
  - target: xTaskbar.TaskListLabeledButtonPanel@RunningIndicatorStates > Image#Icon
    styles:
      - Width@NoRunningIndicator=26
      - Height@NoRunningIndicator=26
      - Width@ActiveRunningIndicator=30
      - Height@ActiveRunningIndicator=30
      - Margin@NoRunningIndicator=0,6,0,0
  - target: _bottomleft__Taskbar.TaskListLabeledButtonPanel@RunningIndicatorStates > Border
    styles:
      - BorderThickness@NoRunningIndicator=1,0,1,0
      - BorderBrush@NoRunningIndicator=Red
  - target: xTaskbar.TaskListLabeledButtonPanel@RunningIndicatorStates > Rectangle#RunningIndicator
    styles:
      - Margin=0,0,0,0
      - Width=34
      - Height=34
      - StrokeDashArray=4
      - StrokeThickness=1
      - Fill=Transparent
      - StrokeDashOffset=5
      - Stroke@NoRunningIndicator=Blue
      - Stroke@ActiveRunningIndicator=Red
      - Stroke@RunningIndicator=Green
      - Stroke@InactiveRunningIndicator=Yellow
  - target: xTaskbar.TaskListLabeledButtonPanel@RunningIndicatorStates > Rectangle#DefaultIcon
    styles:
      - Fill=Blue
      - Width=36
      - Height=36
      - StrokeThickness=10
      - Margin=10,20,0,0
      - Stroke=Red
      - VerticalAlignment=4
  - target: '__SystemTray.NotificationAreaIcons#NotificationAreaIcons > ItemsPresenter > StackPanel > ContentPresenter > SystemTray.NotifyIconView#NotifyItemIcon > Grid#ContainerGrid > ContentPresenter#ContentPresenter > Grid#ContentGrid > SystemTray.ImageIconContent > Grid#ContainerGrid > Image '
    styles:
      - Width=20
      - Height=20
  - target: ___WrapGrid > ContentPresenter > SystemTray.NotifyIconView > Grid#ContainerGrid > ContentPresenter#ContentPresenter > Grid#ContentGrid > SystemTray.ImageIconContent > Grid#ContainerGrid > Image
    styles:
      - Width=20
      - Height=20
  - target: ___Taskbar.TaskListLabeledButtonPanel@RunningIndicatorStates > Border
    styles:
      - BorderBrush@ActiveRunningIndicator=Red
      - BorderThickness@ActiveRunningIndicator=4,0,4,0
      - BorderBrush@NoRunningIndicator=Blue
      - BorderThickness@NoRunningIndicator=4,0,0,0
      - BorderBrush@NoActiveRunningIndicator=Green
      - BorderThickness@NoActiveRunningIndicator=0,4,0,0
  - target: ___Taskbar.TaskListLabeledButtonPanel@RunningIndicatorStates > Border
    styles:
      - BorderBrush@RunningIndicator=Green
      - BorderThickness@RunningIndicator=4,4,4,4


  # App icons' popup
  - target: SystemTray.NotificationAreaOverflow > Grid#OverflowRootGrid
    styles:
      - Padding=0,0,0,0
  - target: SystemTray.NotificationAreaOverflow > Grid#OverflowRootGrid > Border#OverflowFlyoutBackgroundBorder
    styles:
      - BorderThickness=0,0,0,0
  - target: SystemTray.NotificationAreaOverflow > Grid#OverflowRootGrid > ItemsControl
    styles:
      - Margin=0,0,0,0
  - target: SystemSettings.View.RootPage > Grid#RootPageGrid > Grid#RootCommandSearchGrid > SystemSettings.View.SettingsAutoSuggestCommandSearchBox#CommandSearchBox
    styles:
      - Margin=0,0,0,0
  - target: ScrollViewer > ScrollContentPresenter > Border > SystemTray.NotificationAreaOverflow > Grid#OverflowRootGrid > Border#OverflowFlyoutBackgroundBorder
    styles:
      - CornerRadius=0 #≝

  # Volume icon+slider bar
  - target: ScrollViewer > ScrollContentPresenter > Border > HWConfirmatorUI.ConfirmatorHostControl > Canvas#ConfirmatorFrameCanvas > Grid > Grid#ConfirmatorMainGrid
    styles:
      - BorderThickness=0 #≝
      - CornerRadius=0 #≝
      - MinHeight=32 #≝48
  - target: ScrollViewer > ScrollContentPresenter > Border > HWConfirmatorUI.ConfirmatorHostControl > Canvas#ConfirmatorFrameCanvas > Grid
    styles:
      - Padding=0,0,0,0 #≝20,0,20,0
  - target: ScrollViewer > ScrollContentPresenter > Border > HWConfirmatorUI.ConfirmatorHostControl > Canvas#ConfirmatorFrameCanvas > Grid > Grid#ConfirmatorMainGrid > Grid#VolumeConfirmator
    styles:
      - Padding=0,0,0,0 #≝5,3,0,3
  - target: ScrollViewer > ScrollContentPresenter > Border > HWConfirmatorUI.ConfirmatorHostControl > Canvas#ConfirmatorFrameCanvas > Grid > Grid#ConfirmatorMainGrid > Grid#VolumeConfirmator > Button
    styles:
      - Margin=0,0,2,0 #≝0,0,5,0
      - Height=16 #≝32
      - Width=16 #≝32
  - target: ScrollViewer > ScrollContentPresenter > Border > HWConfirmatorUI.ConfirmatorHostControl > Canvas#ConfirmatorFrameCanvas > Grid > Grid#ConfirmatorMainGrid
    styles:
      - MinHeight=16 #≝32
  - target: ScrollViewer > ScrollContentPresenter > Border > HWConfirmatorUI.ConfirmatorHostControl > Canvas#ConfirmatorFrameCanvas > Grid > Grid#ConfirmatorMainGrid > Grid#VolumeConfirmator > Button > ContentPresenter#ContentPresenter > Microsoft.UI.Xaml.Controls.AnimatedIcon#VolumeIcon
    styles:
      - Padding=0,0,0,0 #≝0,0,0,1
  - target: ScrollViewer > ScrollContentPresenter > Border > HWConfirmatorUI.ConfirmatorHostControl > Canvas#ConfirmatorFrameCanvas > Grid > Grid#ConfirmatorMainGrid > Grid#VolumeConfirmator > Slider#volumeSlider > Grid > Grid#SliderContainer > Grid#HorizontalTemplate
    styles: # slider bar
      - RowDefinitions:=<RowDefinitionCollection><RowDefinition Height="2"/><RowDefinition Height="Auto"/><RowDefinition Height="2"/></RowDefinitionCollection> #≝ [{Height=18px}, {Height=Auto}, {Height=18px}])
  - target: ScrollViewer > ScrollContentPresenter > Border > HWConfirmatorUI.ConfirmatorHostControl > Canvas#ConfirmatorFrameCanvas > Grid > Grid#ConfirmatorMainGrid > Grid#VolumeConfirmator > TextBlock#volumeLevelText
    styles: # volume№
      - MinWidth=24 #≝40
      - Margin=0,0,0,0 #≝0,0,0,2
      - VerticalAlignment=1 #≝3
  - target: ScrollViewer > ScrollContentPresenter > Border > HWConfirmatorUI.ConfirmatorHostControl > Canvas#ConfirmatorFrameCanvas
    styles: # position volume bar adjacent to the taskbar
      - VerticalAlignment=1 #≝3
  # Make it slightly more narrow, assuming you don't actually use it to change volume, but mostly for indication
  - target: ScrollViewer > ScrollContentPresenter > Border > HWConfirmatorUI.ConfirmatorHostControl > Canvas#ConfirmatorFrameCanvas > Grid > Grid#ConfirmatorMainGrid > Grid#VolumeConfirmator
    styles:
      - Width:=$volume_bar_width_outer_152
  - target: ScrollViewer > ScrollContentPresenter > Border > HWConfirmatorUI.ConfirmatorHostControl > Canvas#ConfirmatorFrameCanvas > Grid > Grid#ConfirmatorMainGrid > Grid#VolumeConfirmator > Slider#volumeSlider
    styles:
      - Width:=$volume_bar_width_inner_110
  - target: ScrollViewer > ScrollContentPresenter > Border > HWConfirmatorUI.ConfirmatorHostControl > Canvas#ConfirmatorFrameCanvas > Grid > Grid#ConfirmatorMainGrid
    styles:
      - MaxWidth=4096 #≝280
  # ↓ negatively affects the taskbar
  # - target: ScrollViewer
  #   styles:
  #     - Height=16 #≝28.6667
  # - target: Canvas
  #   styles:
  #     - Height=16 #≝
  # - target: ScrollViewer > ScrollContentPresenter > Border
  #   styles:
  #     - Height=16 #≝28.6667
